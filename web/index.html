<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- PWA 基础配置 -->
    <meta name="theme-color" content="#409EFF" />
    <meta name="description" content="基金投资助手，帮助您管理和分析基金投资" />

    <!-- 移动端 Web App 支持 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="基金助手" />
    <!-- iOS PWA 增强配置 -->
    <meta name="apple-mobile-web-app-status-bar-icon" content="/icon-192.png" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    <link rel="apple-touch-icon" href="/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icon-512.png" sizes="512x512" />

    <!-- 视口配置 -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <!-- 图标配置 -->
    <link rel="icon" type="image/svg+xml" href="/icon-192-maskable.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Windows 瓷砖支持 -->
    <meta name="msapplication-TileColor" content="#409EFF" />
    <meta name="msapplication-TileImage" content="/icon-512.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- 安全性相关 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- 预连接优化 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://data.eastmoney.com" />
    <link rel="dns-prefetch" href="https://fundmobapi.eastmoney.com" />
    <link rel="dns-prefetch" href="https://dgs.tiantianfunds.com" />

    <!-- 字体加载 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>基金助手</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
