[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# 将 /api/proxy 映射到 Netlify Function
[[redirects]]
  from = "/api/proxy"
  to = "/.netlify/functions/proxy"
  status = 200

# SPA 路由回退
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
